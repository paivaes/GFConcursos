                                <p class="text-gray-500 mb-6">Comece criando sua primeira redação</p>
                                <button onclick="AplicacaoPrincipal.mostrarModalNovaRedacao()" class="btn-success">
                                    <i class="fas fa-plus mr-2"></i>Criar Primeira Redação
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            },

            mostrarModalNovaRedacao(redacaoId = null) {
                const redacao = redacaoId ? this.dados.redacoes.find(r => r.id === redacaoId) : null;
                
                this.mostrarModal(`
                    <div class="p-6 max-w-4xl max-h-[80vh] overflow-y-auto">
                        <h3 class="text-xl font-semibold mb-4">
                            <i class="fas ${redacao ? 'fa-edit' : 'fa-plus-circle'} mr-2"></i>
                            ${redacao ? 'Editar Redação' : 'Nova Redação'}
                        </h3>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-semibold mb-2">Título:</label>
                                <input type="text" id="redacao-titulo" class="w-full p-3 border rounded-xl" 
                                       value="${redacao ? redacao.titulo : ''}" placeholder="Ex: Redação sobre Sustentabilidade" required>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-semibold mb-2">Tema:</label>
                                <input type="text" id="redacao-tema" class="w-full p-3 border rounded-xl" 
                                       value="${redacao ? redacao.tema : ''}" placeholder="Ex: Desafios da sustentabilidade no século XXI" required>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Data:</label>
                                    <input type="date" id="redacao-data" class="w-full p-3 border rounded-xl" 
                                           value="${redacao ? redacao.data.split('T')[0] : new Date().toISOString().split('T')[0]}" required>
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Nota (opcional):</label>
                                    <input type="number" id="redacao-nota" class="w-full p-3 border rounded-xl" 
                                           value="${redacao ? redacao.nota || '' : ''}" min="0" max="1000" step="0.1" placeholder="Ex: 920">
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-semibold mb-2">Conteúdo:</label>
                                <textarea id="redacao-conteudo" class="editor-resumo w-full p-3 border rounded-xl" 
                                          rows="15" placeholder="Digite o conteúdo da sua redação..." required>${redacao ? redacao.conteudo : ''}</textarea>
                                <div class="flex justify-between text-sm text-gray-500 mt-1">
                                    <span id="contador-palavras">0 palavras</span>
                                    <span id="contador-caracteres-redacao">0 caracteres</span>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-semibold mb-2">Comentários (opcional):</label>
                                <textarea id="redacao-comentarios" class="w-full p-3 border rounded-xl" 
                                          rows="3" placeholder="Comentários sobre a redação...">${redacao ? redacao.comentarios || '' : ''}</textarea>
                            </div>
                        </div>
                        
                        <div class="flex gap-4 mt-6">
                            <button onclick="AplicacaoPrincipal.fecharModal()" class="flex-1 btn-secondary">
                                <i class="fas fa-times mr-1"></i>Cancelar
                            </button>
                            <button onclick="AplicacaoPrincipal.salvarRedacao('${redacaoId}')" class="flex-1 btn-success">
                                <i class="fas fa-save mr-1"></i>${redacao ? 'Atualizar' : 'Salvar'}
                            </button>
                        </div>
                    </div>
                `);

                // Configurar contadores
                const textarea = document.getElementById('redacao-conteudo');
                const contadorPalavras = document.getElementById('contador-palavras');
                const contadorCaracteres = document.getElementById('contador-caracteres-redacao');
                
                if (textarea && contadorPalavras && contadorCaracteres) {
                    textarea.addEventListener('input', function() {
                        const texto = this.value;
                        const palavras = texto.trim() === '' ? 0 : texto.trim().split(/\s+/).length;
                        const caracteres = texto.length;
                        
                        contadorPalavras.textContent = `${palavras} palavras`;
                        contadorCaracteres.textContent = `${caracteres} caracteres`;
                    });
                    
                    // Inicializar contadores
                    const texto = textarea.value;
                    const palavras = texto.trim() === '' ? 0 : texto.trim().split(/\s+/).length;
                    const caracteres = texto.length;
                    
                    contadorPalavras.textContent = `${palavras} palavras`;
                    contadorCaracteres.textContent = `${caracteres} caracteres`;
                }
            },

            salvarRedacao(redacaoId = null) {
                const titulo = document.getElementById('redacao-titulo').value.trim();
                const tema = document.getElementById('redacao-tema').value.trim();
                const data = document.getElementById('redacao-data').value;
                const nota = document.getElementById('redacao-nota').value ? parseFloat(document.getElementById('redacao-nota').value) : null;
                const conteudo = document.getElementById('redacao-conteudo').value.trim();
                const comentarios = document.getElementById('redacao-comentarios').value.trim();
                const palavras = conteudo.trim() === '' ? 0 : conteudo.trim().split(/\s+/).length;

                if (!titulo || !tema || !data || !conteudo) {
                    this.mostrarNotificacao('Preencha todos os campos obrigatórios', 'error');
                    return;
                }

                if (redacaoId) {
                    // Editar redação existente
                    const redacaoIndex = this.dados.redacoes.findIndex(r => r.id === redacaoId);
                    if (redacaoIndex !== -1) {
                        this.dados.redacoes[redacaoIndex] = {
                            ...this.dados.redacoes[redacaoIndex],
                            titulo,
                            tema,
                            data: new Date(data + 'T12:00:00').toISOString(),
                            nota,
                            conteudo,
                            comentarios,
                            palavras,
                            dataAtualizacao: new Date().toISOString()
                        };
                    }
                } else {
                    // Nova redação
                    const novaRedacao = {
                        id: Date.now().toString(),
                        titulo,
                        tema,
                        data: new Date(data + 'T12:00:00').toISOString(),
                        nota,
                        conteudo,
                        comentarios,
                        palavras,
                        dataCriacao: new Date().toISOString(),
                        dataAtualizacao: new Date().toISOString()
                    };
                    this.dados.redacoes.push(novaRedacao);
                }

                this.salvarDadosUsuario();
                this.fecharModal();
                this.carregarRedacoes();
                
                this.mostrarNotificacao(
                    redacaoId ? 'Redação atualizada com sucesso!' : 'Redação criada com sucesso!', 
                    'success'
                );
            },

            visualizarRedacao(id) {
                const redacao = this.dados.redacoes.find(r => r.id === id);
                if (redacao) {
                    this.mostrarModal(`
                        <div class="p-6 max-w-4xl max-h-[80vh] overflow-y-auto">
                            <h3 class="text-2xl font-bold mb-2">${redacao.titulo}</h3>
                            <p class="text-lg text-gray-600 mb-4">${redacao.tema}</p>
                            
                            <div class="flex items-center mb-6">
                                <span class="text-sm text-gray-500 mr-4">
                                    <i class="fas fa-calendar mr-1"></i>
                                    ${new Date(redacao.data).toLocaleDateString('pt-BR')}
                                </span>
                                <span class="text-sm text-gray-500 mr-4">
                                    <i class="fas fa-font mr-1"></i>
                                    ${redacao.palavras} palavras
                                </span>
                                ${redacao.nota ? `
                                    <span class="badge badge-success">
                                        <i class="fas fa-star mr-1"></i>${redacao.nota}
                                    </span>
                                ` : ''}
                            </div>
                            
                            <div class="prose max-w-none mb-6">
                                <pre class="whitespace-pre-wrap font-sans text-gray-800 leading-relaxed">${redacao.conteudo}</pre>
                            </div>
                            
                            ${redacao.comentarios ? `
                                <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6">
                                    <h4 class="font-semibold text-yellow-800 mb-2">Comentários:</h4>
                                    <p class="text-yellow-700">${redacao.comentarios}</p>
                                </div>
                            ` : ''}
                            
                            <div class="flex gap-4">
                                <button onclick="AplicacaoPrincipal.fecharModal()" class="flex-1 btn-secondary">
                                    <i class="fas fa-times mr-1"></i>Fechar
                                </button>
                                <button onclick="AplicacaoPrincipal.editarRedacao('${redacao.id}')" class="flex-1 btn-primary">
                                    <i class="fas fa-edit mr-1"></i>Editar
                                </button>
                            </div>
                        </div>
                    `);
                }
            },

            editarRedacao(id) {
                this.mostrarModalNovaRedacao(id);
            },

            excluirRedacao(id) {
                if (confirm('Tem certeza que deseja excluir esta redação?')) {
                    this.dados.redacoes = this.dados.redacoes.filter(r => r.id !== id);
                    this.salvarDadosUsuario();
                    this.carregarRedacoes();
                    this.mostrarNotificacao('Redação excluída com sucesso!', 'success');
                }
            },

            // =========================
            // FUNÇÕES UTILITÁRIAS
            // =========================
            mostrarModal(conteudo) {
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
                modal.innerHTML = `
                    <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                        <div class="modal-content">${conteudo}</div>
                    </div>
                `;
                
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        document.body.removeChild(modal);
                    }
                });
                
                document.body.appendChild(modal);
            },

            fecharModal() {
                const modal = document.querySelector('.fixed.inset-0.bg-black');
                if (modal) {
                    document.body.removeChild(modal);
                }
            },

            mostrarNotificacao(mensagem, tipo = 'info') {
                const notificacao = document.createElement('div');
                notificacao.className = `fixed top-4 right-4 p-4 rounded-xl shadow-lg z-50 transform transition-all duration-300 ${
                    tipo === 'success' ? 'bg-green-500 text-white' :
                    tipo === 'error' ? 'bg-red-500 text-white' :
                    'bg-blue-500 text-white'
                }`;
                notificacao.textContent = mensagem;
                
                document.body.appendChild(notificacao);
                
                setTimeout(() => {
                    notificacao.style.opacity = '0';
                    notificacao.style.transform = 'translateX(100%)';
                    setTimeout(() => {
                        if (notificacao.parentNode) {
                            notificacao.parentNode.removeChild(notificacao);
                        }
                    }, 300);
                }, 3000);
            },

            salvarDadosUsuario() {
                this.usuario.dados = this.dados;
                
                const usuarioIndex = AuthSystem.usuarios.findIndex(u => u.id === this.usuario.id);
                if (usuarioIndex !== -1) {
                    AuthSystem.usuarios[usuarioIndex] = this.usuario;
                    AuthSystem.salvarUsuarios();
                    localStorage.setItem('gfconcursos_usuario_logado', JSON.stringify(this.usuario));
                }
            },

            abrirConfiguracoes() {
                document.getElementById('modal-configuracoes').classList.remove('hidden');
                document.getElementById('config-nome').value = this.usuario.nome;
                document.getElementById('config-email').value = this.usuario.email;
                document.getElementById('config-meta').value = this.dados.configuracoes.metaDiaria;
            },

            abrirBackup() {
                document.getElementById('modal-backup').classList.remove('hidden');
            }
        };

        // =========================
        // FUNÇÕES GLOBAIS
        // =========================
        function fecharModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        // =========================
        // INICIALIZAÇÃO
        // =========================
        document.addEventListener('DOMContentLoaded', function() {
            AuthSystem.init();
            
            // Configurar eventos dos modais
            document.getElementById('btn-salvar-configuracoes').addEventListener('click', function() {
                const nome = document.getElementById('config-nome').value;
                const email = document.getElementById('config-email').value;
                const meta = parseInt(document.getElementById('config-meta').value);
                
                if (nome && email && meta) {
                    AplicacaoPrincipal.usuario.nome = nome;
                    AplicacaoPrincipal.usuario.email = email;
                    AplicacaoPrincipal.dados.configuracoes.metaDiaria = meta;
                    AplicacaoPrincipal.salvarDadosUsuario();
                    fecharModal('modal-configuracoes');
                    AplicacaoPrincipal.mostrarNotificacao('Configurações salvas com sucesso!', 'success');
                    
                    // Recarregar a interface para atualizar o nome
                    AplicacaoPrincipal.carregarInterface();
                    AplicacaoPrincipal.configurarNavegacao();
                    AplicacaoPrincipal.carregarDashboard();
                }
            });
            
            // Configurar backup
            document.getElementById('btn-fazer-backup').addEventListener('click', function() {
                const dados = {
                    usuario: AplicacaoPrincipal.usuario,
                    timestamp: new Date().toISOString()
                };
                
                const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_gfconcursos_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                AplicacaoPrincipal.mostrarNotificacao('Backup realizado com sucesso!', 'success');
            });
            
            document.getElementById('btn-restaurar-backup').addEventListener('click', function() {
                const input = document.getElementById('input-restaurar-backup');
                const file = input.files[0];
                
                if (!file) {
                    AplicacaoPrincipal.mostrarNotificacao('Selecione um arquivo de backup', 'error');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const dados = JSON.parse(e.target.result);
                        
                        if (dados.usuario && dados.usuario.id === AplicacaoPrincipal.usuario.id) {
                            AplicacaoPrincipal.usuario = dados.usuario;
                            AplicacaoPrincipal.dados = dados.usuario.dados;
                            AplicacaoPrincipal.salvarDadosUsuario();
                            fecharModal('modal-backup');
                            AplicacaoPrincipal.mostrarNotificacao('Backup restaurado com sucesso!', 'success');
                            
                            // Recarregar a aplicação
                            AplicacaoPrincipal.carregarInterface();
                            AplicacaoPrincipal.configurarNavegacao();
                            AplicacaoPrincipal.carregarDashboard();
                        } else {
                            AplicacaoPrincipal.mostrarNotificacao('Arquivo de backup inválido', 'error');
                        }
                    } catch (error) {
                        AplicacaoPrincipal.mostrarNotificacao('Erro ao ler arquivo de backup', 'error');
                    }
                };
                reader.readAsText(file);
            });
        });
    </script>
</body>
</html>
