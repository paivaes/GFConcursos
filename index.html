            // =========================
            // FUNÇÕES UTILITÁRIAS
            // =========================
            obterCorDisciplina(nomeDisciplina) {
                const disciplina = this.dados.disciplinas.find(d => d.nome === nomeDisciplina);
                return disciplina ? disciplina.cor : '#6B7280';
            },

            calcularTaxaAcerto() {
                const total = this.dados.questoes.length;
                const corretas = this.dados.questoes.filter(q => q.status === 'correta').length;
                return total > 0 ? Math.round((corretas / total) * 100) : 0;
            },

            calcularProgressoEdital() {
                if (this.dados.editalVerticalizado.disciplinas.length === 0) return 0;
                
                const totalTopicos = this.dados.editalVerticalizado.disciplinas.reduce(
                    (total, disc) => total + disc.topicos.length, 0
                );
                const topicosConcluidos = this.dados.editalVerticalizado.disciplinas.reduce(
                    (total, disc) => total + disc.topicos.filter(t => t.concluido).length, 0
                );
                
                return totalTopicos > 0 ? Math.round((topicosConcluidos / totalTopicos) * 100) : 0;
            },

            mostrarModal(conteudo) {
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
                modal.innerHTML = `
                    <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                        <div class="modal-content">${conteudo}</div>
                    </div>
                `;
                
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        document.body.removeChild(modal);
                    }
                });
                
                document.body.appendChild(modal);
            },

            fecharModal() {
                const modal = document.querySelector('.fixed.inset-0.bg-black');
                if (modal) {
                    document.body.removeChild(modal);
                }
            },

            mostrarNotificacao(mensagem, tipo = 'info') {
                const notificacao = document.createElement('div');
                notificacao.className = `fixed top-4 right-4 p-4 rounded-xl shadow-lg z-50 transform transition-all duration-300 ${
                    tipo === 'success' ? 'bg-green-500 text-white' :
                    tipo === 'error' ? 'bg-red-500 text-white' :
                    'bg-blue-500 text-white'
                }`;
                notificacao.textContent = mensagem;
                
                document.body.appendChild(notificacao);
                
                setTimeout(() => {
                    notificacao.style.opacity = '0';
                    notificacao.style.transform = 'translateX(100%)';
                    setTimeout(() => {
                        if (notificacao.parentNode) {
                            notificacao.parentNode.removeChild(notificacao);
                        }
                    }, 300);
                }, 3000);
            },

            salvarDadosUsuario() {
                this.usuario.dados = this.dados;
                
                // Sincroniza com a nuvem (Firestore) silenciosamente no background
                db.collection('usuarios').doc(this.usuario.id).update({
                    dados: this.dados
                }).catch(error => {
                    console.error("Erro de sincronização com a nuvem: ", error);
                    this.mostrarNotificacao('Erro de conexão. As alterações não foram salvas na nuvem.', 'error');
                });
            },

            abrirConfiguracoes() {
                document.getElementById('modal-configuracoes').classList.remove('hidden');
                document.getElementById('config-nome').value = this.usuario.nome;
                document.getElementById('config-email').value = this.usuario.email;
                document.getElementById('config-meta').value = this.dados.configuracoes.metaDiaria;
            },

            abrirBackup() {
                document.getElementById('modal-backup').classList.remove('hidden');
            },
	mostrarModalConfigurarEdital() {
                this.mostrarModal(`
                    <div class="p-6 max-w-2xl">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xl font-semibold">
                                <i class="fas fa-file-contract mr-2"></i>Configurar Edital Verticalizado
                            </h3>
                        </div>

                        <div class="space-y-4">
                            <div class="bg-purple-50 border border-purple-200 text-purple-800 p-4 rounded-xl text-sm">
                                <i class="fas fa-magic mr-2"></i>
                                Digite o nome do concurso e o cargo. A Inteligência Artificial vai analisar o padrão da banca e montar automaticamente as disciplinas e tópicos do edital para você acompanhar.
                            </div>

                            <div>
                                <label class="block text-sm font-semibold mb-2">Concurso e Cargo:</label>
                                <input type="text" id="edital-busca-ia" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-purple-500" placeholder="Ex: ALE-RO para Técnico em Informática" value="${this.dados.editalVerticalizado.nomeConcurso !== 'Meu Concurso' ? this.dados.editalVerticalizado.nomeConcurso : ''}">
                            </div>
                        </div>

                        <div class="flex gap-4 mt-6">
                            <button onclick="AplicacaoPrincipal.fecharModal()" class="flex-1 btn-secondary">
                                <i class="fas fa-times mr-1"></i>Cancelar
                            </button>
                            <button type="button" onclick="AplicacaoPrincipal.gerarEditalIA()" id="btn-ia-edital" class="flex-1 bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition-all flex justify-center items-center gap-2">
                                ✨ Gerar Edital com IA
                            </button>
                        </div>
                    </div>
                `);
            },

            async gerarEditalIA() {
                const concurso = document.getElementById('edital-busca-ia').value.trim();

                if (!concurso) {
                    this.mostrarNotificacao('Digite o nome do concurso e cargo.', 'error');
                    return;
                }

                const btn = document.getElementById('btn-ia-edital');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Montando Edital...';
                btn.disabled = true;

                try {
                    const editalGerado = await AIAssistant.gerarEdital(concurso);

                    // Transforma o retorno da IA no modelo de dados do nosso sistema
                    const novoEdital = {
                        nomeConcurso: editalGerado.nomeConcurso,
                        disciplinas: editalGerado.disciplinas.map(disc => ({
                            id: 'disc_' + Date.now().toString() + Math.random().toString(36).substr(2, 5),
                            nome: disc.nome,
                            progresso: 0,
                            topicos: disc.topicos.map(topicoNome => ({
                                id: 'top_' + Date.now().toString() + Math.random().toString(36).substr(2, 5),
                                nome: topicoNome,
                                concluido: false
                            }))
                        }))
                    };

                    this.dados.editalVerticalizado = novoEdital;
                    this.salvarDadosUsuario();
                    this.fecharModal();
                    this.carregarEditalVertical();
                    this.mostrarNotificacao('Edital verticalizado montado com sucesso!', 'success');

                } catch (error) {
                    this.mostrarNotificacao(error.message || 'Erro ao gerar edital.', 'error');
                } finally {
                    btn.innerHTML = '✨ Gerar Edital com IA';
                    btn.disabled = false;
                }
            },

            toggleTopicoEdital(disciplinaId, topicoId) {
                const edital = this.dados.editalVerticalizado;
                const disciplina = edital.disciplinas.find(d => d.id === disciplinaId);

                if (disciplina) {
                    const topico = disciplina.topicos.find(t => t.id === topicoId);
                    if (topico) {
                        // Inverte o status de conclusão do tópico
                        topico.concluido = !topico.concluido;

                        // Recalcula o percentual de progresso da disciplina automaticamente
                        const concluidos = disciplina.topicos.filter(t => t.concluido).length;
                        disciplina.progresso = Math.round((concluidos / disciplina.topicos.length) * 100);

                        this.salvarDadosUsuario();
                        this.carregarEditalVertical(); // Atualiza a tela para mostrar a barra a carregar
                    }
                }
            }

        };

        // =========================
        // FUNÇÕES GLOBAIS
        // =========================
        function fecharModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        // =========================
        // INICIALIZAÇÃO
        // =========================
        document.addEventListener('DOMContentLoaded', function() {
            AuthSystem.init();
            
            // Configurar eventos dos modais
            document.getElementById('btn-salvar-configuracoes').addEventListener('click', function() {
                const nome = document.getElementById('config-nome').value;
                const email = document.getElementById('config-email').value;
                const meta = parseInt(document.getElementById('config-meta').value);
                const apiKey = document.getElementById('config-api-key').value.trim(); // NOVA LINHA
                
                if (nome && email && meta) {
                    AplicacaoPrincipal.usuario.nome = nome;
                    AplicacaoPrincipal.usuario.email = email;
                    AplicacaoPrincipal.dados.configuracoes.metaDiaria = meta;
                    
                    if (apiKey) {
                        localStorage.setItem('gfconcursos_gemini_key', apiKey);
                    }

                    AplicacaoPrincipal.salvarDadosUsuario();
                    fecharModal('modal-configuracoes');
                    AplicacaoPrincipal.mostrarNotificacao('Configurações salvas com sucesso!', 'success');
                    
                    // Recarregar a interface para atualizar
                    AplicacaoPrincipal.carregarInterface();
                    AplicacaoPrincipal.configurarNavegacao();
                    AplicacaoPrincipal.carregarDashboard();
                }
            });
            
            // Configurar backup
            document.getElementById('btn-fazer-backup').addEventListener('click', function() {
                const dados = {
                    usuario: AplicacaoPrincipal.usuario,
                    timestamp: new Date().toISOString()
                };
                
                const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_gfconcursos_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                AplicacaoPrincipal.mostrarNotificacao('Backup realizado com sucesso!', 'success');
            });
            
            document.getElementById('btn-restaurar-backup').addEventListener('click', function() {
                const input = document.getElementById('input-restaurar-backup');
                const file = input.files[0];
                
                if (!file) {
                    AplicacaoPrincipal.mostrarNotificacao('Selecione um arquivo de backup', 'error');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const dados = JSON.parse(e.target.result);
                        
                        if (dados.usuario && dados.usuario.id === AplicacaoPrincipal.usuario.id) {
                            AplicacaoPrincipal.usuario = dados.usuario;
                            AplicacaoPrincipal.dados = dados.usuario.dados;
                            AplicacaoPrincipal.salvarDadosUsuario();
                            fecharModal('modal-backup');
                            AplicacaoPrincipal.mostrarNotificacao('Backup restaurado com sucesso!', 'success');
                            
                            // Recarregar a aplicação
                            AplicacaoPrincipal.carregarInterface();
                            AplicacaoPrincipal.configurarNavegacao();
                            AplicacaoPrincipal.carregarDashboard();
                        } else {
                            AplicacaoPrincipal.mostrarNotificacao('Arquivo de backup inválido', 'error');
                        }
                    } catch (error) {
                        AplicacaoPrincipal.mostrarNotificacao('Erro ao ler arquivo de backup', 'error');
                    }
                };
                reader.readAsText(file);
            });
        });
    </script>
</body>
</html>
